openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: anthropic
    description: Anthropic AI chat operations
  - name: nutrition
    description: Nutrition and meal tracking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /nutrition/meals:
    get:
      operationId: listMeals
      tags: [nutrition]
      summary: List all meals
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of meals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meal"
    post:
      operationId: createMeal
      tags: [nutrition]
      summary: Create and analyze a new meal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealBody"
      responses:
        "201":
          description: Created meal with analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"

  /nutrition/meals/{id}:
    delete:
      operationId: deleteMeal
      tags: [nutrition]
      summary: Delete a meal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionError"

  /nutrition/insights:
    get:
      operationId: getWeeklyInsights
      tags: [nutrition]
      summary: Get AI-generated weekly insights
      responses:
        "200":
          description: Weekly insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NutritionInsight"

  /nutrition/wearable:
    get:
      operationId: getWearableData
      tags: [nutrition]
      summary: Get wearable device metrics
      responses:
        "200":
          description: Wearable metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WearableData"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Meal:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        calories:
          type: number
        protein:
          type: number
        carbs:
          type: number
        fats:
          type: number
        fiber:
          type: number
        healthScore:
          type: number
        insight:
          type: string
        tip:
          type: string
        mealTime:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - description
        - calories
        - protein
        - carbs
        - fats
        - fiber
        - healthScore
        - insight
        - tip
        - mealTime
        - createdAt

    CreateMealBody:
      type: object
      properties:
        description:
          type: string
        mealTime:
          type: string
      required:
        - description
        - mealTime

    NutritionInsight:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [warning, positive, info]
        title:
          type: string
        detail:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - title
        - detail
        - createdAt

    WearableData:
      type: object
      properties:
        steps:
          type: integer
        activeCalories:
          type: integer
        sleepHours:
          type: number
        heartRate:
          type: integer
        aiCommentary:
          type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - steps
        - activeCalories
        - sleepHours
        - heartRate
        - aiCommentary
        - updatedAt

    NutritionError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
