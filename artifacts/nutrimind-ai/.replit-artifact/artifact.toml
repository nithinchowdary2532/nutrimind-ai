kind = "web"
previewPath = "/"
title = "NutriMind AI"
version = "1.0.0"
id = "artifacts/nutrimind-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22968

[services.development]
run = "pnpm --filter @workspace/nutrimind-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nutrimind-ai", "run", "build" ]
publicDir = "artifacts/nutrimind-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22968"
BASE_PATH = "/"
